name: Notify Marketplace

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 5.30.0)'
        required: true

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Normalize version
        id: version
        env:
          VERSION: ${{ github.event.release.tag_name || inputs.version }}
        run: |
          VERSION="${VERSION#v}"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Trigger marketplace update
        uses: baleen37/baleen-marketplace/.github/actions/dispatch-marketplace-update@main
        with:
          token: ${{ secrets.BALEEN_MARKETPLACE_DISPATCH_TOKEN }}
          event_type: update_versions
          plugin: bstack
          version: ${{ steps.version.outputs.value }}
