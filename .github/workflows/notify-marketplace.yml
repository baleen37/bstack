name: Notify Marketplace

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 5.30.0)'
        required: true

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Normalize version
        id: version
        env:
          VERSION: ${{ github.event.release.tag_name || inputs.version }}
        run: |
          VERSION="${VERSION#v}"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BALEEN_RELEASE_APP_ID }}
          private-key: ${{ secrets.BALEEN_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: baleen-marketplace

      - name: Trigger marketplace update
        uses: baleen37/baleen-marketplace/.github/actions/repository-dispatch@main
        with:
          token: ${{ steps.app-token.outputs.token }}
          event-type: update_versions
          client-payload: '{"plugin": "bstack", "version": "${{ steps.version.outputs.value }}"}'
