name: Notify Marketplace

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 5.30.0)'
        required: true

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger marketplace update
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_DISPATCH_TOKEN }}
          VERSION: ${{ github.event.release.tag_name || inputs.version }}
        run: |
          VERSION="${VERSION#v}"
          gh api repos/baleen37/baleen-marketplace/dispatches \
            -f event_type='update-plugin' \
            -f client_payload[plugin]='everything-agent' \
            -f client_payload[version]="$VERSION"
