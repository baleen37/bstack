name: Notify Marketplace

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 5.30.0)'
        required: true

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BALEEN_RELEASE_APP_ID }}
          private-key: ${{ secrets.BALEEN_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: baleen-marketplace

      - name: Notify marketplace
        uses: baleen37/baleen-marketplace/.github/actions/notify@v1
        with:
          source: bstack
          version: ${{ github.event.release.tag_name || inputs.version }}
          token: ${{ steps.app-token.outputs.token }}
